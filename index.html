<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h1 class="fw-bold mb-2">
                        Create Your Account
                    </h1>
                    <p class="text-muted mb-0">
                        Please fill in the details below to register.
                    </p>
                </div>

                <form>

                    <!-- Full Name -->
                    <div class="mb-4">
                        <label for="fullname" class="form-label fw-semibold">
                            Full Name <span class="text-danger">*</span>
                        </label>

                        <input type="text" class="form-control form-control-lg" id="fullname"
                            placeholder="Enter your full name">
                    </div>

                    <!-- Email -->
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">
                            Email Address <span class="text-danger">*</span>
                        </label>

                        <input type="email" class="form-control form-control-lg" id="email"
                            placeholder="Enter your email">

                        <div class="form-text">
                            We'll never share your email with anyone else.
                        </div>
                    </div>

                    <!-- Country -->
                    <div class="mb-4">
                        <label for="country" class="form-label fw-semibold">
                            Country <span class="text-danger">*</span>
                        </label>

                        <select id="country" class="form-select form-select-lg">
                            <option selected>Select your country</option>
                            <option>India</option>
                            <option>USA</option>
                            <option>Canada</option>
                            <option>Australia</option>
                        </select>
                    </div>

                    <!-- Photo -->
                    <div class="mb-4">
                        <label for="photo" class="form-label fw-semibold">
                            Profile Photo
                        </label>

                        <input class="form-control form-control-lg" type="file" id="photo">
                    </div>

                    <!-- Experience -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Experience Level
                        </label>

                        <input type="range" class="form-range" min="0" max="10">
                        <div class="form-text">Slide to show your experience level.</div>
                    </div>

                    <!-- Interests -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Interests (Select any 2)
                        </label>

                        <div class="row">

                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="coding">

                                    <label class="form-check-label" for="coding">
                                        Coding
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="gaming">

                                    <label class="form-check-label" for="gaming">
                                        Gaming
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="reading">

                                    <label class="form-check-label" for="reading">
                                        Reading
                                    </label>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Plan -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Choose Your Plan
                        </label>

                        <div class="row">

                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="plan" id="basic" checked>

                                    <label class="form-check-label" for="basic">
                                        Basic Plan
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="plan" id="premium">

                                    <label class="form-check-label" for="premium">
                                        Premium Plan
                                    </label>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Newsletter -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Subscribe to our Newsletter
                        </label>

                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="newsletter">

                            <label class="form-check-label" for="newsletter">
                                I want to receive updates and news.
                            </label>
                        </div>

                    </div>

                    <!-- Terms -->
                    <div class="alert alert-primary">
                        By creating an account, you agree to our
                        <a href="#">Terms & Conditions</a>
                        and
                        <a href="#">Privacy Policy</a>.
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">
                        Register Now
                    </button>

                    <p class="text-center mt-4 mb-0">
                        Already have an account?
                        <a href="#">Login</a>
                    </p>

                </form>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
